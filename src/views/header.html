<header class="site-header">
  <nav class="site-header__nav" aria-label="Navegación principal">
    <div class="site-header__map">
      <a
        class="site-header__link"
        href="#ubicacion"
        aria-label="Ir a la ubicación de Cuesta Maneli"
      >
        <i class="fa-regular fa-map site-header__icon" aria-hidden="true"></i>
        <span class="visually-hidden">Ubicación</span>
      </a>
    </div>

    <div class="site-header__brand">
      <a class="site-header__logo-link" href="#top" aria-label="Volver al inicio">
        <img
          class="site-header__logo"
          src="./assets/images/logo-cuesta-maneli.svg"
          alt="Cuesta Maneli"
          width="470"
          height="90"
        />
      </a>
    </div>

    <ul class="site-header__menu">
      <li class="site-header__item">
        <a
          class="site-header__link"
          href="#informacion"
          aria-label="Ir a la sección de información"
        >
          <i class="fa-solid fa-info site-header__icon" aria-hidden="true"></i>
          <span class="visually-hidden">Información</span>
        </a>
      </li>

      <li class="site-header__item">
        <a
          class="site-header__link"
          href="#galeria"
          aria-label="Ir a la galería de imágenes"
        >
          <i class="fa-regular fa-camera site-header__icon" aria-hidden="true"></i>
          <span class="visually-hidden">Galería</span>
        </a>
      </li>

      <li class="site-header__item">
        <a
          class="site-header__link"
          href="#curiosidades"
          aria-label="Ir a la sección de curiosidades"
        >
          <i class="fa-regular fa-star site-header__icon" aria-hidden="true"></i>
          <span class="visually-hidden">Curiosidades</span>
        </a>
      </li>
    </ul>
  </nav>
</header>
